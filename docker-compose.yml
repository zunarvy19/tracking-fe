version: "3.8"

services:
  nginx:
    build: .
    container_name: nginxx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    #   - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - tflow-web
    networks:
      - shared_pg_network

  tflow-web:
    build: .
    container_name: tflow_fe
    restart: unless-stopped
    ports:
      - "80"
    networks:
      - shared_pg_network

networks:
  shared_pg_network:
    external: true
