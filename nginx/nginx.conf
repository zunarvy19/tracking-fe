# 1. HTTP → redirect ke HTTPS
server {
    listen 80;
    server_name cuantrack.zvy.my.id www.cuantrack.zvy.my.id;

    return 301 https://$host$request_uri;
}

# 2. HTTPS (INI YANG UTAMA)
server {
    listen 443 ssl;
    server_name cuantrack.zvy.my.id www.cuantrack.zvy.my.id;

    ssl_certificate /etc/letsencrypt/live/cuantrack.zvy.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cuantrack.zvy.my.id/privkey.pem;

    # Fix header size
    client_header_buffer_size 16k;
    large_client_header_buffers 4 32k;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://tflow_api:6969;

        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
        proxy_busy_buffers_size 32k;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}